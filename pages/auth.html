<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeenLaunch | Login</title>
  <script src="../js/theme-mode.js"></script>
  <script src="../js/api-config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/settings.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar" aria-label="Main navigation">
      <a class="brand" href="../index.html" aria-label="TeenLaunch home">
        <img class="brand-logo" src="../assets/images/light_logo.png" alt="" aria-hidden="true">
        <span>
          TeenLaunch
          <small>Future founders start here</small>
        </span>
      </a>
    </nav>
  </header>

  <main class="auth-main">
    <section class="auth-panel" aria-labelledby="authTitle">
      <div class="auth-copy">
        <p class="eyebrow">TeenLaunch Account</p>
        <h1 id="authTitle">Login to continue</h1>
        <p>Sign in or create an account to save opportunities, register for programmes, and use your Career DNA results.</p>
      </div>

      <div class="auth-card">
        <div class="auth-tabs" role="tablist" aria-label="Authentication options">
          <button class="auth-tab active" type="button" data-auth-tab="login" role="tab" aria-selected="true">Login</button>
          <button class="auth-tab" type="button" data-auth-tab="register" role="tab" aria-selected="false">Register</button>
        </div>

        <p class="auth-message" data-auth-message aria-live="polite"></p>

        <form class="auth-form active" data-auth-form="login">
          <label>
            Email
            <input type="email" name="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <input type="password" name="password" autocomplete="current-password" required>
          </label>
          <button class="btn primary" type="submit">Login</button>
        </form>

        <form class="auth-form" data-auth-form="register">
          <label>
            Full name
            <input type="text" name="name" autocomplete="name" required>
          </label>
          <label>
            Email
            <input type="email" name="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <input type="password" name="password" autocomplete="new-password" required minlength="6">
          </label>
          <label>
            Confirm password
            <input type="password" name="confirm_password" autocomplete="new-password" required minlength="6">
          </label>
          <label>
            Age
            <input type="number" name="age" min="10" max="19" inputmode="numeric" required>
          </label>
          <label>
            School name <span class="optional-label">Optional</span>
            <input type="text" name="school_name" autocomplete="organization">
          </label>
          <label>
            Education level
            <select name="education_level" required>
              <option value="">Select education level</option>
              <option value="Secondary School">Secondary School</option>
              <option value="Junior College">Junior College</option>
              <option value="Polytechnic">Polytechnic</option>
              <option value="ITE">ITE</option>
              <option value="University">University</option>
              <option value="Other">Other</option>
            </select>
          </label>
          <button class="btn primary" type="submit">Create Account</button>
        </form>
      </div>
    </section>
  </main>

  <script src="../js/auth.js"></script>
</body>
</html>
