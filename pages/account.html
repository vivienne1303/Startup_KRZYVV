<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>TeenLaunch | Edit Profile</title><script src="../js/theme-mode.js"></script><script src="../js/api-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css"><link rel="stylesheet" href="../css/theme.css"><link rel="stylesheet" href="../css/settings.css">
</head>
<body>
  <header class="site-header"><nav class="navbar" aria-label="Main navigation"><a class="brand" href="../index.html"><img class="brand-logo" src="../assets/images/light_logo.png" alt=""><span>TeenLaunch<small>Future founders start here</small></span></a><a class="dna-header-link" href="profile.html">Back to Profile</a></nav></header>
  <main><section class="section settings-hero edit-profile-page">
    <div class="edit-profile-title"><h1>Edit Profile</h1></div>
    <form class="account-panel edit-profile-form" data-account-form>
      <div class="edit-picture-section">
        <div class="account-avatar edit-avatar"><img data-profile-preview alt="Profile picture preview" hidden><span data-account-initials>TL</span></div>
        <label class="edit-picture-button">Edit picture<input class="sr-only" type="file" name="profile_picture" accept="image/png,image/jpeg,image/webp"></label>
        <p class="picture-help">JPG, PNG or WebP, up to 1 MB.</p>
      </div>
      <div class="edit-profile-identity"><h2 data-account-name>Loading profile...</h2><p data-account-email></p><span class="account-role" data-account-role></span></div>
      <p class="account-message" data-account-message aria-live="polite"></p>
      <div class="account-grid edit-profile-grid">
        <label><span class="field-title">Full name</span><input type="text" name="full_name" autocomplete="name" required></label>
        <label><span class="field-title">Username</span><input type="text" name="username" pattern="[A-Za-z0-9_.]{3,30}" placeholder="your.username" data-i18n-placeholder="your.username" required></label>
        <label><span class="field-title">Bio <small>(optional)</small></span><textarea name="bio" rows="4" placeholder="Tell people about yourself"></textarea></label>
        <label><span class="field-title">School name <small>(optional)</small></span><input type="text" name="school_name" autocomplete="organization"></label>
        <label><span class="field-title">Phone number <small>(optional)</small></span><input type="tel" name="phone_number" autocomplete="tel"></label>
        <label><span class="field-title">Age</span><input type="number" name="age" min="10" max="19" inputmode="numeric" required></label>
        <label><span class="field-title">Education level</span><select name="education_level" required><option value="">Select education level</option><option>Secondary School</option><option>Junior College</option><option>Polytechnic</option><option>ITE</option><option>University</option><option>Other</option></select></label>
        <label><span class="field-title">Country <small>(optional)</small></span><input type="text" name="country" autocomplete="country-name"></label>
        <label><span class="field-title">Portfolio URL <small>(optional)</small></span><input type="url" name="portfolio_url" placeholder="https://your-portfolio.com" data-i18n-placeholder="https://your-portfolio.com" inputmode="url"></label>
      </div>
      <div class="settings-actions edit-profile-actions"><button class="btn primary" type="submit">Save changes</button><a class="btn secondary" href="profile.html">Cancel</a></div>
    </form>
  </section></main>
  <script src="../js/auth-guard.js"></script><script src="../js/auth-nav.js"></script><script src="../js/account.js"></script><script src="../js/i18n.js"></script>
</body></html>
