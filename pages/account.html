<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="TeenLaunch | Account">TeenLaunch | Account</title>
  <script src="../js/theme-mode.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/settings.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar" aria-label="Main navigation">
      <a class="brand" href="../index.html"><img class="brand-logo" src="../assets/images/light_logo.png" alt="" aria-hidden="true"><span>TeenLaunch<small data-i18n="Future founders start here">Future founders start here</small></span></a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false"><span></span><span></span><span></span></button>
      <div class="nav-links">
        <a href="../index.html" data-i18n="Home">Home</a>
        <a href="opportunities.html" data-i18n="Opportunities">Opportunities</a>
        <div class="nav-dropdown">
          <a class="nav-trigger" href="competitions.html" data-i18n="Competitions">Competitions</a>
          <div class="dropdown-menu" aria-label="Competition categories">
            <a href="competition_academic.html" data-i18n="Academic">Academic</a>
            <a href="competition_non-academic.html" data-i18n="Non-Academic">Non-Academic</a>
          </div>
        </div>
        <a href="resources.html" data-i18n="Resources">Resources</a>
        <a href="debate.html" data-i18n="Soft Skills & Debate">Soft Skills & Debate</a>
        <a href="aiassistant.html" data-i18n="AI Chatbot">AI Chatbot</a>
        <a class="auth-link" href="auth.html">Login</a>
        <a class="settings-button active" href="settings.html" aria-label="Settings">
          <img src="../assets/icons/settings.jpg" alt="" aria-hidden="true">
        </a>
        <button class="language-toggle" type="button" data-language-toggle aria-label="Switch language">中文</button>
      </div>
    </nav>
  </header>

  <main>
    <section class="section settings-hero">
      <div class="section-heading reveal">
        <p class="eyebrow">Account</p>
        <h1>Your TeenLaunch profile.</h1>
      </div>

      <form class="account-panel reveal" data-account-form>
        <div class="account-summary">
          <div class="account-avatar" data-account-initials>TL</div>
          <div>
            <h2 data-account-name>Loading profile...</h2>
            <p data-account-email></p>
            <span class="account-role" data-account-role></span>
          </div>
        </div>

        <p class="account-message" data-account-message aria-live="polite"></p>

        <div class="account-grid">
          <label>
            Full name
            <input type="text" name="full_name" autocomplete="name" required>
          </label>
          <label>
            Age
            <input type="number" name="age" min="10" max="19" inputmode="numeric" required>
          </label>
          <label>
            Education level
            <select name="education_level" required>
              <option value="">Select education level</option>
              <option value="Secondary School">Secondary School</option>
              <option value="Junior College">Junior College</option>
              <option value="Polytechnic">Polytechnic</option>
              <option value="ITE">ITE</option>
              <option value="University">University</option>
              <option value="Other">Other</option>
            </select>
          </label>
          <label>
            School name <span class="optional-label">Optional</span>
            <input type="text" name="school_name" autocomplete="organization">
          </label>
          <label>
            Country <span class="optional-label">Optional</span>
            <input type="text" name="country" autocomplete="country-name">
          </label>
          <label class="account-wide">
            Bio <span class="optional-label">Optional</span>
            <textarea name="bio" rows="4" placeholder="A short note about your goals, interests, or skills."></textarea>
          </label>
        </div>

        <div class="settings-actions">
          <button class="btn primary" type="submit">Save Profile</button>
          <a class="btn secondary" href="settings.html">Back to Settings</a>
        </div>
      </form>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 TeenLaunch</p>
    <a href="settings.html" data-i18n="Settings">Settings</a>
    <a href="../index.html" data-i18n="Home">Home</a>
  </footer>
  <script src="../js/auth-guard.js"></script>
  <script src="../js/auth-nav.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../script.js"></script>
  <script src="../js/account.js"></script>
</body>
</html>
