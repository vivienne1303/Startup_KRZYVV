<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>TeenLaunch | Apply</title><script src="../js/theme-mode.js"></script><script src="../js/api-config.js"></script><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="../style.css"><link rel="stylesheet" href="../css/theme.css"><link rel="stylesheet" href="../css/settings.css"><link rel="stylesheet" href="../css/apply.css"></head><body><header class="site-header"><nav class="navbar"><a class="brand" href="../index.html"><img class="brand-logo" src="../assets/images/light_logo.png" alt=""><span>TeenLaunch<small>Future founders start here</small></span></a><a class="dna-header-link" href="profile.html">My Profile</a></nav></header><main class="apply-main"><section class="apply-shell"><p data-apply-loading>Loading opportunity...</p><div data-apply-content hidden><article class="apply-opportunity"><p class="eyebrow" data-category></p><h1 data-title></h1><p data-description></p><dl><div><dt>Deadline</dt><dd data-deadline></dd></div><div><dt>Eligibility</dt><dd data-eligibility></dd></div><div><dt>Format/location</dt><dd data-format></dd></div><div><dt>Organisation</dt><dd data-organisation></dd></div></dl></article><form class="apply-form" novalidate><h2>Application form</h2><p class="form-message" data-form-message aria-live="polite"></p><div class="apply-grid"><label>Full name<input name="full_name" required autocomplete="name"><small data-error="full_name"></small></label><label>Email<input name="email" type="email" required autocomplete="email"><small data-error="email"></small></label><label>Phone number<input name="phone_number" type="tel" required autocomplete="tel"><small data-error="phone_number"></small></label><label>Date of birth<input name="date_of_birth" type="date" required><small data-error="date_of_birth"></small></label><label>School name<input name="school_name" required autocomplete="organization"><small data-error="school_name"></small></label><label>Current education level<input name="education_level" required><small data-error="education_level"></small></label><label>Portfolio URL <span>Optional</span><input name="portfolio_url" type="url" placeholder="https://"><small data-error="portfolio_url"></small></label><label>Resume URL <span>Optional</span><input name="resume_url" type="url" placeholder="https://"><small data-error="resume_url"></small></label><label class="wide">Why are you interested?<textarea name="motivation" required rows="5"></textarea><small data-error="motivation"></small></label><label class="wide">Relevant skills or experience<textarea name="relevant_experience" required rows="5"></textarea><small data-error="relevant_experience"></small></label><label class="wide">Additional comments <span>Optional</span><textarea name="additional_comments" rows="3"></textarea></label></div><label class="confirm"><input name="accurate" type="checkbox" required> I confirm that the submitted information is accurate.</label><small data-error="accurate"></small><button class="btn primary" type="submit">Submit application</button></form></div><div class="apply-error" data-apply-error hidden><h1>Application unavailable</h1><p data-apply-error-message></p><a class="btn secondary" href="opportunities.html">Back to opportunities</a></div></section></main><script src="../js/apply.js"></script><script src="../js/i18n.js"></script></body></html>
