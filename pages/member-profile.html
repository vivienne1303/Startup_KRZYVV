<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TeenLaunch | Member Profile</title><script src="../js/theme-mode.js"></script><script src="../js/api-config.js"></script><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="../style.css"><link rel="stylesheet" href="../css/theme.css"><link rel="stylesheet" href="../css/settings.css"><link rel="stylesheet" href="../css/profile.css"></head><body>
<header class="site-header profile-site-header"><nav class="navbar" aria-label="Main navigation"><a class="brand" href="../index.html"><img class="brand-logo" src="../assets/images/light_logo.png" alt=""><span>TeenLaunch<small>Future founders start here</small></span></a><div class="nav-links"><a class="auth-link" href="auth.html">Login</a></div></nav></header>
<main class="profile-main"><section class="profile-shell"><p data-member-loading>Loading profile…</p><div data-member-content hidden><header class="profile-header"><div class="profile-avatar"><img data-member-picture alt="Profile picture"><span data-member-initials></span></div><div class="profile-info"><div class="profile-title"><h1 data-member-username></h1></div><div class="profile-stats"><div><strong data-member-app-count>0</strong><span>Applications</span></div><a data-member-followers-link><strong data-member-followers>0</strong><span>Followers</span></a><a data-member-following-link><strong data-member-following>0</strong><span>Following</span></a></div><div class="profile-details"><h2 data-member-name></h2><p data-member-bio></p><p data-member-school></p></div><div class="profile-actions"><button class="btn secondary" type="button" data-member-follow>Follow</button><a class="btn primary" data-member-message>Message</a></div></div></header>
<nav class="profile-tabs" aria-label="Profile sections"><button class="active" data-member-tab="applied">Applied</button><button data-member-tab="saved">Saved</button><button data-member-tab="about">About</button></nav><section data-member-panel="applied"><h2>Applied Opportunities</h2><div class="applied-grid" data-member-applications></div><div class="profile-empty" data-member-app-empty hidden><p>No applied opportunities to show.</p></div></section><section data-member-panel="saved" hidden><h2>Saved Opportunities</h2><div class="applied-grid" data-member-saved></div><div class="profile-empty" data-member-saved-empty hidden><p>No saved opportunities to show.</p></div></section><section data-member-panel="about" hidden><article class="about-card"><h2>About</h2><dl><div><dt>Full name</dt><dd data-about-name></dd></div><div><dt>Bio</dt><dd data-about-bio></dd></div><div><dt>School</dt><dd data-about-school></dd></div></dl></article></section></div><div class="profile-error" data-member-error hidden><p data-member-error-message></p><a class="btn secondary" href="community.html">Back to Find People</a></div></section></main>
<script src="../js/auth-nav.js"></script><script src="../js/i18n.js"></script><script src="../js/member-profile.js"></script></body></html>
