<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TeenLaunch | Inbox</title><script src="../js/theme-mode.js"></script><script src="../js/api-config.js"></script><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="../style.css"><link rel="stylesheet" href="../css/theme.css"><link rel="stylesheet" href="../css/settings.css"><link rel="stylesheet" href="../css/social.css"></head><body>
<header class="site-header"><nav class="navbar" aria-label="Main navigation"><a class="brand" href="../index.html"><img class="brand-logo" src="../assets/images/light_logo.png" alt=""><span>TeenLaunch<small>Future founders start here</small></span></a><div class="nav-links"><a class="auth-link" href="auth.html">Login</a></div></nav></header>
<main class="social-main"><section class="social-shell inbox-shell"><div class="section-heading"><div><p class="eyebrow">Updates and messages</p><h1>Inbox</h1></div><a class="btn secondary" href="community.html">Find people</a></div>
